<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Combo Survivor Rebuild</title>
<style>
*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05060b;color:#eef7ff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",Arial,sans-serif}
canvas{display:block;width:100vw;height:100vh;background:#05060b;touch-action:none}
#ui{position:fixed;inset:0;pointer-events:none;color:#e6fbff;font-weight:900;text-shadow:0 0 8px rgba(125,211,252,.75)}
#left{position:absolute;left:13px;top:12px;font-size:18px;line-height:1.5}
#right{position:absolute;right:13px;top:12px;text-align:right;font-size:15px;line-height:1.5}
#expBox{position:absolute;left:13px;right:13px;top:78px;height:13px;background:#06250f;border:1px solid #22c55e;border-radius:999px;overflow:hidden;box-shadow:0 0 10px rgba(34,197,94,.35) inset}
#expBar{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#a3e635,#fefce8)}
#hpBox{position:absolute;left:13px;top:99px;width:166px;height:12px;background:#3b0808;border:1px solid #ef4444;border-radius:999px;overflow:hidden}
#hpBar{height:100%;width:100%;background:linear-gradient(90deg,#ef4444,#f97316,#fde68a)}
#weapons{position:absolute;left:10px;bottom:12px;max-width:72%;font-size:12px;line-height:1.38;background:rgba(2,6,23,.62);border:1px solid rgba(148,163,184,.25);padding:8px 10px;border-radius:13px;color:#f8fafc}
#toast{position:absolute;left:50%;top:31%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.24);border-radius:14px;padding:11px 15px;font-size:18px;text-align:center;white-space:pre-line;opacity:0;transition:.15s;min-width:190px}
.overlay{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.80);z-index:10;pointer-events:auto;padding:14px}.panel{width:min(94vw,480px);background:linear-gradient(180deg,#111827,#0b1120);border:1px solid #38bdf8;border-radius:22px;padding:18px;box-shadow:0 0 45px rgba(0,0,0,.8)}.panel h1,.panel h2{text-align:center;margin:0 0 12px}.panel p{margin:8px 0;color:#bfdbfe;line-height:1.55;font-weight:750}.btn,.choice{display:block;width:100%;margin:10px 0;padding:14px 15px;border-radius:15px;border:1px solid #38bdf8;background:#164e63;color:#fff;font-weight:900;font-size:15px}.choice{text-align:left;background:#1e293b}.choice small{display:block;color:#bfdbfe;margin-top:4px;font-weight:750;line-height:1.35}.combo{background:#78350f;border-color:#f59e0b}.stat{background:#312e81;border-color:#818cf8}.tiny{font-size:12px;color:#a5b4fc}.row{display:flex;gap:8px}.row .btn{flex:1}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="left">Lv. <span id="lvText">1</span><br><span id="mainWeapon">🔫 기관총 Lv.1</span><br><span style="font-size:13px">KILL <span id="killText">0</span></span></div>
  <div id="right">TIME <span id="timeText">0:00</span><br>EXP <span id="expText">0/14</span><br>DANGER <span id="dangerText">1</span></div>
  <div id="expBox"><div id="expBar"></div></div>
  <div id="hpBox"><div id="hpBar"></div></div>
  <div id="weapons"></div>
  <div id="toast"></div>
</div>
<div id="menu" class="overlay">
  <div class="panel">
    <h1>COMBO SURVIVOR</h1>
    <p>렉 줄인 재구축 버전. 적 수는 제한하고 체력·속도·피해량을 올려 난이도를 높였다.</p>
    <p>화면 아무 곳이나 누르면 그 위치에 조이스틱이 생긴다. 자동 공격으로 버티고, 무기 2개를 Lv.4 이상 찍어 조합을 완성하라.</p>
    <p class="tiny">권장: 모바일 크롬 / 가로모드 / 절전모드 해제</p>
    <button class="btn" id="startBtn">게임 시작</button>
  </div>
</div>
<div id="levelPanel" class="overlay"><div class="panel"><h2>LEVEL UP</h2><div id="choices"></div></div></div>
<div id="gameover" class="overlay"><div class="panel"><h2 id="overTitle">GAME OVER</h2><p id="result"></p><div class="row"><button class="btn" id="restartBtn">다시 시작</button></div></div></div>
<script>
(() => {
'use strict';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha:false });
const $ = id => document.getElementById(id);
const ui = {
  menu:$('menu'), levelPanel:$('levelPanel'), gameover:$('gameover'), choices:$('choices'), startBtn:$('startBtn'), restartBtn:$('restartBtn'),
  lvText:$('lvText'), mainWeapon:$('mainWeapon'), killText:$('killText'), timeText:$('timeText'), expText:$('expText'), dangerText:$('dangerText'),
  expBar:$('expBar'), hpBar:$('hpBar'), weapons:$('weapons'), toast:$('toast'), overTitle:$('overTitle'), result:$('result')
};
let W=0,H=0,DPR=1,last=performance.now();
let running=false, paused=false, keys=Object.create(null);
let player, cam, level=1, exp=0, need=14, kills=0, time=0, owned, combos, timers, choiceList=[];
let enemies=[], bullets=[], gems=[], areas=[], particles=[], rings=[], beams=[];
let bossSpawned=false, hardModeStarted=false;
const joy={active:false,id:null,baseX:0,baseY:0,x:0,y:0,dx:0,dy:0,r:66,k:31,visible:false};
const MAX = { enemies:130, bullets:260, gems:260, areas:70, particles:160, beams:50 };
const weaponData = {
  lightning:{icon:'⚡',name:'낙뢰',desc:'무작위 적 위치에 낙뢰.'},
  chain:{icon:'🔗',name:'체인',desc:'근처 적을 묶고 감전.'},
  blackhole:{icon:'🌑',name:'블랙홀',desc:'적을 끌어당기는 중력장.'},
  boomerang:{icon:'🪃',name:'부메랑',desc:'왕복 관통 투척 무기.'},
  gun:{icon:'🔫',name:'기관총',desc:'가까운 적에게 빠르게 사격.'},
  skull:{icon:'💀',name:'해골',desc:'저주/독성 구름 생성.'},
  missile:{icon:'🔮',name:'매직미사일',desc:'적을 추적하는 마법탄.'},
  sword:{icon:'⚔️',name:'검',desc:'주변을 베는 근접 공격.'},
  laser:{icon:'🔴',name:'레이저',desc:'직선 빔으로 적을 관통.'},
  lung:{icon:'🫁',name:'유지호의 폐',desc:'압력파와 폭발성 숨결.'},
  scythe:{icon:'🗡️',name:'대낫',desc:'전방 넓은 베기.'}
};
const comboList = [
  {a:'lightning',b:'chain',key:'stormnet',icon:'🌩️',name:'뇌전망',desc:'전장 전체에 전기 그물을 유지하고 주기적으로 감전.'},
  {a:'blackhole',b:'boomerang',key:'gravityScythe',icon:'🌀',name:'중력낫',desc:'블랙홀을 부메랑처럼 던져 경로 전체 흡입/폭발.'},
  {a:'gun',b:'skull',key:'poisonGun',icon:'☠️',name:'독탄기관총',desc:'총알마다 독 스택. 독 적 처치 시 독 구름.'},
  {a:'missile',b:'sword',key:'magicSwordsman',icon:'🗡️',name:'마법검사',desc:'검 궤적을 따라 추적 미사일 연쇄 발사.'},
  {a:'laser',b:'lung',key:'pyrolyzer',icon:'🔥',name:'열분해포',desc:'레이저 경로가 폭발과 화염 지대로 변한다.'},
  {a:'sword',b:'boomerang',key:'stormSword',icon:'🌪️',name:'폭풍검',desc:'검을 던져 왕복 베기. 돌아오는 길에 회오리.'},
  {a:'skull',b:'blackhole',key:'plagueEye',icon:'👁️',name:'역병의 눈',desc:'블랙홀이 독과 저주를 확산.'},
  {a:'lightning',b:'laser',key:'plasmaBeam',icon:'☄️',name:'플라즈마 빔',desc:'레이저가 닿은 적에게 낙뢰 연쇄.'},
  {a:'lung',b:'boomerang',key:'explosiveBoomerang',icon:'💥',name:'폭발 부메랑',desc:'부메랑 경로마다 폭발 카펫 생성.'},
  {a:'gun',b:'missile',key:'multiMissile',icon:'🚀',name:'다연장 추적포',desc:'기관총 속도로 추적 미사일 난사.'},
  {a:'chain',b:'scythe',key:'deathScythe',icon:'💀',name:'사신의 낫',desc:'낫과 체인으로 적을 끌어당기며 이동 불가.'}
];
function rand(a,b){return Math.random()*(b-a)+a}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by)}
function fmt(t){t=Math.floor(t);return Math.floor(t/60)+':'+String(t%60).padStart(2,'0')}
function scr(x,y){return {x:x-cam.x+W/2,y:y-cam.y+H/2}}
function danger(){return 1+Math.floor(time/22)+Math.floor(level/5)}
function toast(s){ui.toast.textContent=s;ui.toast.style.opacity=1;clearTimeout(toast.t);toast.t=setTimeout(()=>ui.toast.style.opacity=0,850)}
function resize(){DPR=Math.min(window.devicePixelRatio||1,1.12);W=innerWidth;H=innerHeight;canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);MAX.enemies=W<800?115:150;MAX.bullets=W<800?210:300;MAX.particles=W<800?110:180}
function reset(){
  player={x:0,y:0,r:17,hp:120,maxHp:120,speed:262,angle:0,inv:0,magnet:145,damage:1,fireRate:1,regen:0};
  cam={x:0,y:0,shake:0}; level=1; exp=0; need=14; kills=0; time=0; bossSpawned=false; hardModeStarted=false;
  owned={gun:1}; combos={}; timers={spawn:0,global:0};
  for(const k of Object.keys(weaponData)) timers[k]=0;
  enemies=[]; bullets=[]; gems=[]; areas=[]; particles=[]; rings=[]; beams=[]; choiceList=[];
  for(let i=0;i<16;i++) spawnEnemy(false);
  updateUI();
}
function start(){ui.menu.style.display='none';ui.levelPanel.style.display='none';ui.gameover.style.display='none';reset();running=true;paused=false;toast('START')}
function enemyCap(){return MAX.enemies}
function spawnEnemy(boss=false){
  if(!boss && enemies.length>=enemyCap()) return;
  const side=Math.floor(rand(0,4)); const margin=Math.max(W,H)*.58+120;
  let x=player.x,y=player.y;
  if(side===0){x+=rand(-W/2,W/2);y-=margin} if(side===1){x+=rand(-W/2,W/2);y+=margin} if(side===2){x-=margin;y+=rand(-H/2,H/2)} if(side===3){x+=margin;y+=rand(-H/2,H/2)}
  const d=danger(); const elite=!boss && Math.random()<Math.min(.2,time/260);
  const types=['mutant','crawler','skull','eye','shooter']; let type=types[Math.floor(rand(0,types.length))];
  if(elite) type=['brute','reaper','spitter'][Math.floor(rand(0,3))]; if(boss) type='boss';
  const hpBase=18+d*7+time/5; const hpMul=boss?72:elite?6:type==='brute'?5:type==='crawler'?.55:type==='shooter'?1.15:1;
  const r=boss?48:elite?26:type==='crawler'?13:type==='eye'?17:18;
  const speedBase=86+Math.min(125,time*.75); const speedMul=boss?.55:type==='crawler'?1.55:type==='brute'?.6:type==='reaper'?1.22:1;
  enemies.push({x,y,r,type,boss,elite,hp:hpBase*hpMul,maxHp:hpBase*hpMul,speed:speedBase*speedMul,hit:0,poison:0,slow:0,bind:0,shoot:rand(1,2.3),dead:false,poisoned:false});
}
function addGem(x,y,v=1){if(gems.length<MAX.gems)gems.push({x,y,r:6,v,spin:rand(0,6),dead:false})}
function particle(x,y,color,n=8,pow=160){for(let i=0;i<n&&particles.length<MAX.particles;i++){const a=rand(0,Math.PI*2),s=rand(pow*.25,pow);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rand(1.6,4.2),life:rand(.22,.55),max:.55,c:color})}}
function ring(x,y,c,r=70){rings.push({x,y,c,r,life:.32,max:.32})}
function area(x,y,r,life,dmg,type,opt={}){if(areas.length<MAX.areas)areas.push({x,y,r,life,max:life,dmg,type,tick:0,...opt})}
function beam(x1,y1,x2,y2,life,dmg,type,opt={}){if(beams.length<MAX.beams)beams.push({x1,y1,x2,y2,life,max:life,dmg,type,tick:0,...opt})}
function nearest(x=player.x,y=player.y,range=999999){let best=null,bd=range;for(const e of enemies){const d=dist(x,y,e.x,e.y);if(d<bd){bd=d;best=e}}return best}
function fire(type,angle,opt={}){if(bullets.length>=MAX.bullets)return;const sp=opt.speed||620;bullets.push({type,x:opt.x??player.x+Math.cos(angle)*24,y:opt.y??player.y+Math.sin(angle)*24,vx:Math.cos(angle)*sp,vy:Math.sin(angle)*sp,r:opt.r||6,life:opt.life||1.25,dmg:(opt.dmg||3)*player.damage,c:opt.c||'#fff',homing:!!opt.homing,pierce:opt.pierce||0,poison:opt.poison||0,slow:opt.slow||0,explode:opt.explode||0,mode:opt.mode||'',phase:0,timer:0,dead:false})}
function gainExp(v){exp+=v;let leveled=false;while(exp>=need){exp-=need;level++;need=Math.floor(need*1.43+9);leveled=true;break}if(leveled)openLevel();updateUI()}
function canCombo(c){return (owned[c.a]||0)>=4 && (owned[c.b]||0)>=4 && !combos[c.key]}
function openLevel(){paused=true;const pool=[];
  for(const c of comboList) if(canCombo(c)) pool.push({type:'combo',combo:c,title:`${c.icon} ${c.name} 조합`,desc:c.desc});
  for(const k of Object.keys(weaponData)){const lv=owned[k]||0,d=weaponData[k];if(lv===0)pool.push({type:'weapon',key:k,title:`${d.icon} ${d.name} 획득`,desc:d.desc});else if(lv<6)pool.push({type:'weapon',key:k,title:`${d.icon} ${d.name} Lv.${lv+1}`,desc:'피해량/범위/발동 속도 강화'});}
  pool.push({type:'stat',key:'damage',title:'🔺 공격 증폭',desc:'모든 피해 +8%'});
  pool.push({type:'stat',key:'speed',title:'👟 이동 강화',desc:'이동속도 +7%'});
  pool.push({type:'stat',key:'hp',title:'❤️ 생존 강화',desc:'최대 체력 +18, 즉시 회복'});
  pool.push({type:'stat',key:'magnet',title:'🧲 흡수 강화',desc:'EXP 흡수 범위 +35'});
  choiceList=pool.sort(()=>Math.random()-.5).sort((a,b)=>(a.type==='combo'?-1:0)-(b.type==='combo'?-1:0)).slice(0,3);
  ui.choices.innerHTML=choiceList.map((p,i)=>`<button class="choice ${p.type==='combo'?'combo':p.type==='stat'?'stat':''}" data-pick="${i}">${p.title}<small>${p.desc}</small></button>`).join('');
  ui.levelPanel.style.display='grid';
}
function pick(i){const p=choiceList[i];if(!p)return;
  if(p.type==='combo'){combos[p.combo.key]=true;toast(`${p.combo.icon} ${p.combo.name}\n조합 완성`);particle(player.x,player.y,'#f59e0b',50,420);ring(player.x,player.y,'#f59e0b',220)}
  else if(p.type==='weapon'){owned[p.key]=(owned[p.key]||0)+1;toast(`${weaponData[p.key].icon} ${weaponData[p.key].name}\nLv.${owned[p.key]}`)}
  else if(p.type==='stat'){if(p.key==='damage')player.damage*=1.08;if(p.key==='speed')player.speed*=1.07;if(p.key==='hp'){player.maxHp+=18;player.hp=Math.min(player.maxHp,player.hp+36)}if(p.key==='magnet')player.magnet+=35;toast(p.title)}
  paused=false;ui.levelPanel.style.display='none';updateUI();
}
function hitEnemy(e,dmg,opt={}){if(!e||e.dead||e.hp<=0)return;e.hp-=dmg*player.damage;e.hit=.06;if(opt.poison){e.poison+=opt.poison;e.poisoned=true}if(opt.slow)e.slow=Math.max(e.slow,opt.slow);if(opt.bind)e.bind=Math.max(e.bind,opt.bind);if(opt.pull){e.x+=(opt.px-e.x)*opt.pull;e.y+=(opt.py-e.y)*opt.pull}}
function weaponUpdate(dt){const t=nearest();const a=t?Math.atan2(t.y-player.y,t.x-player.x):player.angle;
  if(owned.gun&&(timers.gun-=dt)<=0){const lv=owned.gun,n=combos.multiMissile?3:1;for(let i=0;i<n;i++)fire(combos.multiMissile?'missile':'gun',a+rand(-.17,.17),{dmg:3+lv*.95,speed:combos.multiMissile?560:760,r:combos.multiMissile?7:4.5,homing:!!combos.multiMissile,poison:combos.poisonGun?.9:0,c:combos.poisonGun?'#a3e635':combos.multiMissile?'#c084fc':'#fde047',explode:combos.multiMissile?20:0});timers.gun=(combos.multiMissile?.09:Math.max(.09,.22-lv*.018))/player.fireRate}
  if(owned.missile&&(timers.missile-=dt)<=0){const lv=owned.missile,n=combos.multiMissile?4:1+Math.floor(lv/3);for(let i=0;i<n;i++)fire('missile',a+rand(-1.2,1.2),{dmg:5+lv,homing:true,speed:540,r:8,c:'#c084fc',explode:combos.multiMissile?34:0});timers.missile=combos.multiMissile?.32:Math.max(.62,1.15-lv*.06)}
  if(owned.lightning&&(timers.lightning-=dt)<=0){const lv=owned.lightning,n=combos.stormnet?5+lv:1+Math.floor(lv/2);for(let i=0;i<n;i++){const e=enemies[Math.floor(Math.random()*enemies.length)];if(e){area(e.x,e.y,combos.stormnet?62:46+lv*2,.14,8+lv*1.2,'lightning');particle(e.x,e.y,'#7dd3fc',5,170)}}timers.lightning=combos.stormnet?.42:Math.max(.7,1.25-lv*.06)}
  if(owned.chain&&(timers.chain-=dt)<=0){const lv=owned.chain;let count=0,lastX=player.x,lastY=player.y;for(const e of enemies){if(count>=lv+2)break;if(dist(player.x,player.y,e.x,e.y)<430+lv*20){hitEnemy(e,5+lv,{bind:combos.deathScythe?1.2:.45});beam(lastX,lastY,e.x,e.y,.12,0,'chain');lastX=e.x;lastY=e.y;count++}}timers.chain=combos.stormnet?.22:Math.max(.45,.9-lv*.05)}
  if(owned.blackhole&&(timers.blackhole-=dt)<=0){const lv=owned.blackhole;const e=t||{x:player.x+Math.cos(a)*180,y:player.y+Math.sin(a)*180};if(combos.gravityScythe){fire('gravityScythe',a,{dmg:7+lv,speed:480,r:22,life:2.2,pierce:999,c:'#a78bfa',mode:'boomerang'})}else{area(e.x,e.y,80+lv*8,1.45,3.2+lv*.6,combos.plagueEye?'plagueHole':'blackhole')}timers.blackhole=combos.gravityScythe?1.25:Math.max(1.45,2.4-lv*.11)}
  if(owned.boomerang&&(timers.boomerang-=dt)<=0){const lv=owned.boomerang,n=1+Math.floor(lv/3)+(combos.explosiveBoomerang?1:0)+(combos.stormSword?1:0);for(let i=0;i<n;i++)fire(combos.stormSword?'stormSword':combos.explosiveBoomerang?'explosiveBoomerang':'boomerang',a+rand(-.8,.8),{dmg:5+lv*.9,speed:450,r:14,life:2.1,pierce:999,c:combos.stormSword?'#e0f2fe':combos.explosiveBoomerang?'#fb923c':'#67e8f9',mode:'boomerang'});timers.boomerang=Math.max(.72,1.35-lv*.08)}
  if(owned.skull&&(timers.skull-=dt)<=0){const lv=owned.skull;const e=t||{x:player.x+rand(-180,180),y:player.y+rand(-180,180)};area(e.x+rand(-45,45),e.y+rand(-45,45),combos.plagueEye?90:56+lv*4,combos.plagueEye?2.2:1.2,2.4+lv*.45,'poison');timers.skull=Math.max(.65,1.35-lv*.07)}
  if(owned.sword&&(timers.sword-=dt)<=0){const lv=owned.sword;area(player.x+Math.cos(a)*45,player.y+Math.sin(a)*45,64+lv*7,.18,8+lv*1.3,'sword',{ang:a});if(combos.magicSwordsman){for(let i=-1;i<=1;i++)fire('magicSword',a+i*.32,{dmg:4+lv,homing:true,speed:600,r:7,c:'#bfdbfe',explode:18})}timers.sword=combos.magicSwordsman?.38:Math.max(.48,1.0-lv*.06)}
  if(owned.laser&&(timers.laser-=dt)<=0){const lv=owned.laser;const len=Math.max(W,H)*1.05;const x2=player.x+Math.cos(a)*len,y2=player.y+Math.sin(a)*len;beam(player.x,player.y,x2,y2,combos.pyrolyzer?.32:.18,9+lv*1.2,combos.plasmaBeam?'plasmaBeam':combos.pyrolyzer?'pyroLaser':'laser',{width:combos.pyrolyzer?32:22});if(combos.pyrolyzer){for(let i=1;i<5;i++){area(player.x+Math.cos(a)*len*i/5,player.y+Math.sin(a)*len*i/5,42,.55,4.2,'fire')}}if(combos.plasmaBeam&&t){area(t.x,t.y,95,.2,10+lv,'lightning')}timers.laser=combos.plasmaBeam?.55:combos.pyrolyzer?.62:Math.max(.82,1.45-lv*.06)}
  if(owned.lung&&(timers.lung-=dt)<=0){const lv=owned.lung;const tx=t?t.x:player.x+Math.cos(a)*170,ty=t?t.y:player.y+Math.sin(a)*170;area(tx,ty,combos.pyrolyzer?82:58+lv*4,.22,7+lv*1.1,combos.pyrolyzer?'fire':'blast');timers.lung=Math.max(.55,1.1-lv*.05)}
  if(owned.scythe&&(timers.scythe-=dt)<=0){const lv=owned.scythe;area(player.x+Math.cos(a)*70,player.y+Math.sin(a)*70,combos.deathScythe?125:82+lv*5,.2,10+lv*1.7,combos.deathScythe?'deathScythe':'scythe',{ang:a});timers.scythe=combos.deathScythe?.54:Math.max(.72,1.3-lv*.07)}
}
function pointLineDist(px,py,x1,y1,x2,y2){const A=px-x1,B=py-y1,C=x2-x1,D=y2-y1;const dot=A*C+B*D,len=C*C+D*D;const t=len?clamp(dot/len,0,1):0;const x=x1+C*t,y=y1+D*t;return dist(px,py,x,y)}
function update(dt){if(!running||paused)return;time+=dt;if(player.regen>0)player.hp=Math.min(player.maxHp,player.hp+player.regen*dt);
  let mx=0,my=0;if(keys.w||keys.arrowup)my--;if(keys.s||keys.arrowdown)my++;if(keys.a||keys.arrowleft)mx--;if(keys.d||keys.arrowright)mx++;if(joy.active){mx=joy.dx;my=joy.dy}const m=Math.hypot(mx,my);if(m>0){mx/=m;my/=m;player.x+=mx*player.speed*dt;player.y+=my*player.speed*dt;player.angle=Math.atan2(my,mx)}
  player.inv=Math.max(0,player.inv-dt);cam.x=player.x+rand(-cam.shake,cam.shake);cam.y=player.y+rand(-cam.shake,cam.shake);cam.shake=Math.max(0,cam.shake-30*dt);
  timers.spawn-=dt;if(timers.spawn<=0){let wave=Math.min(12,2+Math.floor(time/15)+Math.floor(level/5));for(let i=0;i<wave;i++)spawnEnemy(false);timers.spawn=Math.max(.34,.95-time/650)}
  if(time>210&&!bossSpawned){bossSpawned=true;spawnEnemy(true);toast('BOSS 출현')}
  if(time>300&&!hardModeStarted){hardModeStarted=true;toast('DANGER 상승\n적 강화')}
  weaponUpdate(dt);
  if(combos.stormnet){timers.global-=dt;if(timers.global<=0){for(const e of enemies){hitEnemy(e,1.8+level*.12,{bind:.12})}timers.global=.18}}
  for(const b of bullets){b.timer+=dt;if(b.mode==='boomerang'){if(b.timer>.72){const a=Math.atan2(player.y-b.y,player.x-b.x);b.vx=b.vx*.82+Math.cos(a)*560*.18;b.vy=b.vy*.82+Math.sin(a)*560*.18;if(b.timer>1.05&&dist(b.x,b.y,player.x,player.y)<40)b.dead=true}if((b.type==='explosiveBoomerang'||b.type==='gravityScythe'||b.type==='stormSword')&&b.timer-b.phase>.12){b.phase=b.timer;if(b.type==='explosiveBoomerang')area(b.x,b.y,38,.16,5,'fire');if(b.type==='gravityScythe')area(b.x,b.y,58,.16,4,'blackhole');if(b.type==='stormSword')area(b.x,b.y,46,.13,5,'sword')}}
    if(b.homing){const e=nearest(b.x,b.y,460);if(e){const a=Math.atan2(e.y-b.y,e.x-b.x);b.vx=b.vx*.87+Math.cos(a)*720*.13;b.vy=b.vy*.87+Math.sin(a)*720*.13}}
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;if(b.life<=0)b.dead=true}
  for(const e of enemies){let a=Math.atan2(player.y-e.y,player.x-e.x),sp=e.speed*(e.slow>0?.55:1)*(e.bind>0?.18:1)*(hardModeStarted?1.08:1);e.x+=Math.cos(a)*sp*dt;e.y+=Math.sin(a)*sp*dt;e.hit=Math.max(0,e.hit-dt);e.slow=Math.max(0,e.slow-dt);e.bind=Math.max(0,e.bind-dt);if(e.poison>0){e.hp-=e.poison*dt*2.4;e.poison=Math.max(0,e.poison-dt*.22)}if((e.type==='shooter'||e.type==='spitter')&&(e.shoot-=dt)<=0&&dist(e.x,e.y,player.x,player.y)<650){fireEnemy(e,a);e.shoot=rand(1.2,2.3)}if(dist(e.x,e.y,player.x,player.y)<e.r+player.r&&player.inv<=0)damagePlayer(e.boss?32:e.elite?20:14)}
  for(const ar of areas){ar.life-=dt;ar.tick-=dt;if(ar.life<=0)continue;const tick=ar.tick<=0;if(tick)ar.tick=.08;for(const e of enemies){if(dist(ar.x,ar.y,e.x,e.y)<ar.r+e.r){if(tick){let d=ar.dmg;if(ar.type==='blackhole'||ar.type==='plagueHole')hitEnemy(e,d,{pull:.08,px:ar.x,py:ar.y,poison:ar.type==='plagueHole'?1.1:0,slow:.15});else if(ar.type==='poison')hitEnemy(e,d,{poison:1.25,slow:.1});else if(ar.type==='deathScythe')hitEnemy(e,d,{bind:.9,pull:.12,px:player.x,py:player.y});else hitEnemy(e,d,{slow:ar.type==='ice'?.6:0})}}}}
  for(const bm of beams){bm.life-=dt;bm.tick-=dt;const tick=bm.tick<=0;if(tick)bm.tick=.075;for(const e of enemies){if(pointLineDist(e.x,e.y,bm.x1,bm.y1,bm.x2,bm.y2)<(bm.width||24)+e.r){if(tick){hitEnemy(e,bm.dmg,{slow:bm.type==='plasmaBeam'?.08:0});if(bm.type==='plasmaBeam')area(e.x,e.y,48,.12,5,'lightning')}}}}
  for(const b of bullets){if(b.dead)continue;for(const e of enemies){if(e.dead||e.hp<=0)continue;if(dist(b.x,b.y,e.x,e.y)<b.r+e.r){hitEnemy(e,b.dmg,{poison:b.poison,slow:b.slow});if(b.explode)area(e.x,e.y,b.explode,.16,b.dmg*.6,'fire');if(b.pierce>0)b.pierce--;else b.dead=true;particle(e.x,e.y,b.c,4,130);break}}}
  bullets=bullets.filter(b=>!b.dead);areas=areas.filter(a=>a.life>0);beams=beams.filter(b=>b.life>0);
  for(const e of enemies){if(e.hp<=0&&!e.dead){e.dead=true;kills++;const n=e.boss?28:e.elite?5:1;for(let i=0;i<n;i++)addGem(e.x+rand(-18,18),e.y+rand(-18,18),e.boss?2:1);if(combos.poisonGun&&e.poisoned)area(e.x,e.y,58,1.1,2.8,'poison');if(combos.plagueEye&&e.poison>0)area(e.x,e.y,70,1.2,3.0,'poison');particle(e.x,e.y,e.boss?'#fb923c':e.elite?'#facc15':'#ef4444',e.boss?55:10,e.boss?420:190);if(e.boss)victory()}}
  enemies=enemies.filter(e=>!e.dead);
  for(const g of gems){g.spin+=dt*7;const d=dist(g.x,g.y,player.x,player.y);if(d<player.magnet){const a=Math.atan2(player.y-g.y,player.x-g.x);g.x+=Math.cos(a)*(400+(player.magnet-d)*2)*dt;g.y+=Math.sin(a)*(400+(player.magnet-d)*2)*dt}if(d<player.r+g.r+9){g.dead=true;gainExp(g.v)}}gems=gems.filter(g=>!g.dead);
  for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.90;p.vy*=.90;p.life-=dt}particles=particles.filter(p=>p.life>0);rings=rings.filter(r=>(r.life-=dt)>0);
  updateUI();
}
function fireEnemy(e,a){if(bullets.length>=MAX.bullets)return;bullets.push({type:'enemy',x:e.x,y:e.y,vx:Math.cos(a)*310,vy:Math.sin(a)*310,r:7,life:2.5,dmg:10,c:'#ef4444',homing:false,pierce:0,poison:0,slow:0,explode:0,mode:'',phase:0,timer:0,enemy:true,dead:false})}
function damagePlayer(dmg){player.hp-=dmg;player.inv=.45;cam.shake=8;particle(player.x,player.y,'#ef4444',12,230);if(player.hp<=0){running=false;ui.overTitle.textContent='GAME OVER';ui.result.innerHTML=`TIME ${fmt(time)}<br>LEVEL ${level}<br>KILL ${kills}<br>COMBO ${Object.keys(combos).length}/11`;ui.gameover.style.display='grid'}}
function victory(){running=false;ui.overTitle.textContent='BOSS CLEAR';ui.result.innerHTML=`보스 처치 성공<br>TIME ${fmt(time)}<br>LEVEL ${level}<br>KILL ${kills}<br>COMBO ${Object.keys(combos).length}/11`;ui.gameover.style.display='grid'}
function updateUI(){ui.lvText.textContent=level;ui.killText.textContent=kills;ui.timeText.textContent=fmt(time);ui.expText.textContent=`${exp}/${need}`;ui.dangerText.textContent=danger();ui.expBar.style.width=clamp(exp/need*100,0,100)+'%';ui.hpBar.style.width=clamp(player.hp/player.maxHp*100,0,100)+'%';const list=[];for(const [k,v] of Object.entries(owned)){const d=weaponData[k];list.push(`${d.icon} ${d.name} Lv.${v}`)}for(const k of Object.keys(combos)){const c=comboList.find(x=>x.key===k);if(c)list.push(`${c.icon} ${c.name}`)}const first=Object.keys(owned)[0];ui.mainWeapon.textContent=first?`${weaponData[first].icon} ${weaponData[first].name} Lv.${owned[first]}`:'';ui.weapons.innerHTML=list.slice(0,14).join('<br>')}
function drawBg(){ctx.fillStyle='#05060b';ctx.fillRect(0,0,W,H);const size=82,ox=(( -cam.x%size)+size)%size,oy=(( -cam.y%size)+size)%size;ctx.strokeStyle='rgba(59,130,246,.12)';ctx.lineWidth=1;for(let x=ox-size;x<W+size;x+=size){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=oy-size;y<H+size;y+=size){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}}
function drawAreas(){for(const a of areas){const p=scr(a.x,a.y);let c='#f59e0b';if(a.type==='lightning')c='#7dd3fc';if(a.type==='poison'||a.type==='plagueHole')c='#84cc16';if(a.type==='blackhole')c='#6d28d9';if(a.type==='sword'||a.type==='scythe'||a.type==='deathScythe')c='#e0f2fe';if(a.type==='fire')c='#fb923c';ctx.globalAlpha=clamp(a.life/a.max*.55,.12,.55);ctx.fillStyle=c;ctx.beginPath();ctx.arc(p.x,p.y,a.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}
function drawBeams(){ctx.lineCap='round';for(const b of beams){const p1=scr(b.x1,b.y1),p2=scr(b.x2,b.y2);let c=b.type==='chain'?'#93c5fd':b.type==='plasmaBeam'?'#38bdf8':b.type==='pyroLaser'?'#fb923c':'#fb7185';ctx.globalAlpha=clamp(b.life/b.max,.2,1);ctx.strokeStyle=c;ctx.lineWidth=b.width||18;ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();ctx.strokeStyle='#fff';ctx.lineWidth=Math.max(3,(b.width||18)*.22);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();ctx.globalAlpha=1}}
function drawGems(){for(const g of gems){const p=scr(g.x,g.y);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(g.spin);ctx.fillStyle='#a3e635';ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(7,0);ctx.lineTo(0,8);ctx.lineTo(-7,0);ctx.closePath();ctx.fill();ctx.restore()}}
function drawBullets(){for(const b of bullets){const p=scr(b.x,b.y);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(b.vy,b.vx));ctx.fillStyle=b.enemy?'#ef4444':b.c;if(b.type==='boomerang'||b.type==='explosiveBoomerang'||b.type==='stormSword'||b.type==='gravityScythe'){ctx.strokeStyle=b.c;ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,0,b.r,0.35,5.5);ctx.stroke()}else if(b.type==='sword'||b.type==='magicSword'){ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(-7,-4);ctx.lineTo(-4,0);ctx.lineTo(-7,4);ctx.closePath();ctx.fill()}else{ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill()}ctx.restore()}}
function drawEnemy(e){const p=scr(e.x,e.y);ctx.save();ctx.translate(p.x,p.y);if(e.type==='crawler'){ctx.fillStyle=e.hit>0?'#fecaca':'#dc2626';ctx.beginPath();ctx.ellipse(0,0,e.r*1.1,e.r*.65,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#7f1d1d';ctx.lineWidth=3;for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*5,4);ctx.lineTo(i*7,14);ctx.stroke()}}
else if(e.type==='skull'){ctx.fillStyle=e.hit>0?'#fff7ed':'#e5e7eb';ctx.beginPath();ctx.arc(0,-3,e.r*.82,0,Math.PI*2);ctx.fill();ctx.fillStyle='#020617';ctx.beginPath();ctx.arc(-5,-5,3,0,Math.PI*2);ctx.arc(5,-5,3,0,Math.PI*2);ctx.fill();ctx.fillRect(-5,5,10,5)}
else if(e.type==='eye'){ctx.fillStyle=e.hit>0?'#fef3c7':'#111827';ctx.strokeStyle='#22c55e';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(0,0,e.r*.42,0,Math.PI*2);ctx.fill();ctx.fillStyle='#020617';ctx.beginPath();ctx.arc(0,0,e.r*.2,0,Math.PI*2);ctx.fill()}
else if(e.type==='shooter'||e.type==='spitter'){ctx.fillStyle=e.hit>0?'#bfdbfe':'#2563eb';ctx.beginPath();ctx.moveTo(e.r,0);ctx.lineTo(-e.r*.65,-e.r*.75);ctx.lineTo(-e.r*.2,0);ctx.lineTo(-e.r*.65,e.r*.75);ctx.closePath();ctx.fill();ctx.strokeStyle='#93c5fd';ctx.stroke()}
else if(e.type==='brute'){ctx.fillStyle=e.hit>0?'#fed7aa':'#92400e';ctx.beginPath();ctx.ellipse(0,0,e.r,e.r*1.1,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#f59e0b';ctx.lineWidth=4;ctx.stroke();ctx.fillStyle='#fef3c7';ctx.beginPath();ctx.moveTo(-8,-e.r*.7);ctx.lineTo(-18,-e.r*1.2);ctx.lineTo(-4,-e.r*.9);ctx.fill();ctx.beginPath();ctx.moveTo(8,-e.r*.7);ctx.lineTo(18,-e.r*1.2);ctx.lineTo(4,-e.r*.9);ctx.fill()}
else if(e.type==='reaper'){ctx.fillStyle=e.hit>0?'#e9d5ff':'#1e1b4b';ctx.beginPath();ctx.moveTo(0,-e.r);ctx.lineTo(e.r*.75,e.r);ctx.lineTo(0,e.r*.55);ctx.lineTo(-e.r*.75,e.r);ctx.closePath();ctx.fill();ctx.strokeStyle='#c084fc';ctx.stroke()}
else if(e.type==='boss'){ctx.fillStyle=e.hit>0?'#fecaca':'#7f1d1d';ctx.beginPath();ctx.ellipse(0,8,e.r*.9,e.r*1.08,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fb923c';ctx.lineWidth=5;ctx.stroke();ctx.fillStyle='#fef3c7';ctx.beginPath();ctx.moveTo(-15,-e.r*.75);ctx.lineTo(-36,-e.r*1.32);ctx.lineTo(-5,-e.r*.95);ctx.fill();ctx.beginPath();ctx.moveTo(15,-e.r*.75);ctx.lineTo(36,-e.r*1.32);ctx.lineTo(5,-e.r*.95);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-10,-20,4,0,Math.PI*2);ctx.arc(10,-20,4,0,Math.PI*2);ctx.fill()}
else{ctx.fillStyle=e.hit>0?'#fecaca':'#b91c1c';ctx.beginPath();ctx.ellipse(0,4,e.r*1.05,e.r*.75,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ef4444';ctx.lineWidth=3;ctx.stroke();ctx.fillStyle='#450a0a';ctx.beginPath();ctx.moveTo(e.r*.35,-e.r*.45);ctx.lineTo(e.r*.6,-e.r);ctx.lineTo(e.r*.8,-e.r*.25);ctx.fill()}
ctx.restore();const hp=clamp(e.hp/e.maxHp,0,1);ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(p.x-e.r,p.y-e.r-10,e.r*2,4);ctx.fillStyle=e.boss?'#fb923c':e.elite?'#facc15':'#ef4444';ctx.fillRect(p.x-e.r,p.y-e.r-10,e.r*2*hp,4)}
function drawEnemies(){for(const e of enemies)drawEnemy(e)}
function drawParticles(){for(const p0 of particles){const p=scr(p0.x,p0.y);ctx.globalAlpha=clamp(p0.life/p0.max,0,1);ctx.fillStyle=p0.c;ctx.beginPath();ctx.arc(p.x,p.y,p0.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}for(const r of rings){const p=scr(r.x,r.y),q=1-r.life/r.max;ctx.globalAlpha=clamp(r.life/r.max,0,1);ctx.strokeStyle=r.c;ctx.lineWidth=5*(1-q)+2;ctx.beginPath();ctx.arc(p.x,p.y,r.r*q,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}}
function drawPlayer(){const p=scr(player.x,player.y);ctx.fillStyle='rgba(168,85,247,.22)';ctx.beginPath();ctx.arc(p.x,p.y,52,0,Math.PI*2);ctx.fill();ctx.save();ctx.translate(p.x,p.y);ctx.rotate(player.angle);ctx.fillStyle=player.inv>0?'#fef3c7':'#5b21b6';ctx.strokeStyle='#e9d5ff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(28,0);ctx.lineTo(-14,-14);ctx.lineTo(-7,0);ctx.lineTo(-14,14);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore()}
function drawJoy(){if(!joy.visible)return;ctx.globalAlpha=.9;ctx.fillStyle='rgba(14,165,233,.12)';ctx.beginPath();ctx.arc(joy.baseX,joy.baseY,joy.r+18,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(125,211,252,.85)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(joy.baseX,joy.baseY,joy.r,0,Math.PI*2);ctx.stroke();ctx.fillStyle=joy.active?'rgba(186,230,253,.75)':'rgba(186,230,253,.35)';ctx.beginPath();ctx.arc(joy.x,joy.y,joy.k,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
function drawComboOverlay(){if(!combos.stormnet)return;ctx.globalAlpha=.13;ctx.strokeStyle='#7dd3fc';ctx.lineWidth=2;const gap=90;for(let x=(( -cam.x)%gap+gap)%gap;x<W;x+=gap){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+H*.6,H);ctx.stroke()}for(let x=(( -cam.x)%gap+gap)%gap;x<W;x+=gap){ctx.beginPath();ctx.moveTo(x,H);ctx.lineTo(x+H*.6,0);ctx.stroke()}ctx.globalAlpha=1}
function draw(){drawBg();drawComboOverlay();drawAreas();drawBeams();drawGems();drawBullets();drawEnemies();drawParticles();drawPlayer();drawJoy()}
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}
function moveJoy(px,py){let dx=px-joy.baseX,dy=py-joy.baseY;const d=Math.hypot(dx,dy);if(d>joy.r){dx=dx/d*joy.r;dy=dy/d*joy.r}joy.dx=dx/joy.r;joy.dy=dy/joy.r;joy.x=joy.baseX+dx;joy.y=joy.baseY+dy}
function releaseJoy(){joy.active=false;joy.visible=false;joy.id=null;joy.dx=0;joy.dy=0}
window.addEventListener('resize',resize);window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
canvas.addEventListener('pointerdown',e=>{joy.active=true;joy.visible=true;joy.id=e.pointerId;joy.baseX=e.clientX;joy.baseY=e.clientY;joy.x=e.clientX;joy.y=e.clientY;canvas.setPointerCapture(e.pointerId);moveJoy(e.clientX,e.clientY)});
canvas.addEventListener('pointermove',e=>{if(joy.active&&e.pointerId===joy.id)moveJoy(e.clientX,e.clientY)});canvas.addEventListener('pointerup',e=>{if(e.pointerId===joy.id)releaseJoy()});canvas.addEventListener('pointercancel',releaseJoy);
ui.startBtn.addEventListener('click',start);ui.restartBtn.addEventListener('click',start);ui.choices.addEventListener('click',e=>{const b=e.target.closest('[data-pick]');if(b)pick(Number(b.dataset.pick))});
resize();reset();ui.menu.style.display='grid';requestAnimationFrame(loop);
})();
