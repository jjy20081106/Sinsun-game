<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>천겁생존록</title>
<style>
*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05060a;color:#f8fafc;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",Arial,sans-serif}
canvas{display:block;width:100vw;height:100vh;background:#05060a;touch-action:none}
#ui{position:fixed;inset:0;pointer-events:none;color:#e0f2fe;font-weight:900;text-shadow:0 0 8px rgba(56,189,248,.75)}
#left{position:absolute;left:14px;top:14px;font-size:18px;line-height:1.5}
#right{position:absolute;right:14px;top:14px;text-align:right;font-size:15px;line-height:1.55}
#qiBox{position:absolute;left:14px;right:14px;top:82px;height:14px;background:#102010;border:1px solid #22c55e;border-radius:999px;overflow:hidden;box-shadow:0 0 14px rgba(34,197,94,.4) inset}
#qiBar{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#a3e635,#fefce8)}
#hpBox{position:absolute;left:14px;top:105px;width:174px;height:12px;background:#3b0a0a;border:1px solid #f87171;border-radius:999px;overflow:hidden}
#hpBar{height:100%;width:100%;background:linear-gradient(90deg,#ef4444,#f97316,#fde68a)}
#artifacts{position:absolute;left:12px;bottom:14px;max-width:70%;padding:9px 10px;border:1px solid rgba(148,163,184,.32);border-radius:14px;background:rgba(15,23,42,.62);font-size:12px;line-height:1.45;color:#f8fafc}
#hint{position:absolute;right:12px;bottom:14px;max-width:42%;padding:8px 10px;border-radius:12px;background:rgba(2,6,23,.45);border:1px solid rgba(125,211,252,.22);font-size:12px;color:#bae6fd;text-align:right}
#toast{position:absolute;left:50%;top:32%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:12px 16px;font-size:18px;text-align:center;white-space:pre-line;opacity:0;transition:.18s;min-width:180px}
.overlay{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.78);z-index:10;pointer-events:auto;padding:14px}.panel{width:min(94vw,470px);background:linear-gradient(180deg,#111827,#0f172a);border:1px solid #38bdf8;border-radius:22px;padding:18px;box-shadow:0 0 48px rgba(0,0,0,.8)}.panel h1,.panel h2{text-align:center;margin:0 0 12px;color:#f8fafc}.panel p{margin:8px 0;color:#bfdbfe;line-height:1.58;font-weight:700}.btn,.choice{display:block;width:100%;margin:10px 0;padding:14px 15px;border-radius:15px;border:1px solid #38bdf8;background:#164e63;color:#fff;font-weight:900;font-size:15px}.btn:active,.choice:active{transform:scale(.985)}.choice{text-align:left;background:#1e293b}.choice small{display:block;color:#bfdbfe;margin-top:4px;font-weight:700}.evo{background:#78350f;border-color:#f59e0b}.danger{background:#581c87;border-color:#c084fc}.charGrid{display:grid;grid-template-columns:1fr;gap:8px;margin:12px 0}.charCard{width:100%;padding:12px;border-radius:15px;border:1px solid rgba(148,163,184,.35);background:#111827;color:#fff;text-align:left;font-weight:900}.charCard small{display:block;color:#bfdbfe;margin-top:4px;line-height:1.35}.charCard.selected{border-color:#facc15;background:#422006;box-shadow:0 0 18px rgba(250,204,21,.22)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="left">경지 <span id="realmText">연기 1성</span><br><span id="mainArtifact">⚔️ 비검 Lv.1</span><br><span style="font-size:13px">처치 <span id="killText">0</span></span></div>
  <div id="right">시간 <span id="timeText">0:00</span><br>영기 <span id="qiText">0/6</span><br>천겁 위험도 <span id="dangerText">1</span></div>
  <div id="qiBox"><div id="qiBar"></div></div>
  <div id="hpBox"><div id="hpBar"></div></div>
  <div id="artifacts"></div>
  <div id="hint">화면 아무 곳이나<br>누르고 드래그 이동</div>
  <div id="toast"></div>
</div>
<div id="menu" class="overlay"><div class="panel"><h1>천겁생존록</h1><p>선협 기반 뱀서라이크. 이번 버전은 고정 왼쪽 조이스틱이 아니라 <b>손가락을 누른 위치에 조이스틱이 생성</b>된다.</p><div id="charSelect" class="charGrid"><button class="charCard selected" data-char="yun">⚔️ 유청운<small>정파 검수 · 비검 특화 · 피해량 +8%</small></button><button class="charCard" data-char="soyeon">⚡ 백소연<small>뇌령근 술사 · 청뢰부 쿨타임 감소 · 광역 섬멸</small></button><button class="charCard" data-char="mujin">💪 진무결<small>금강 체수 · 높은 체력 · 피해 감소 · 호신옥패</small></button></div><button class="btn" id="startBtn">비경 입장</button></div></div>
<div id="levelPanel" class="overlay"><div class="panel"><h2>소경지 돌파</h2><div id="choices"></div></div></div>
<div id="gameover" class="overlay"><div class="panel"><h2 id="overTitle">도행 붕괴</h2><p id="result"></p><button class="btn" id="restartBtn">다시 입장</button></div></div>
<script>
(()=>{'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const $=id=>document.getElementById(id);
const el={menu:$('menu'),levelPanel:$('levelPanel'),gameover:$('gameover'),choices:$('choices'),startBtn:$('startBtn'),restartBtn:$('restartBtn'),realmText:$('realmText'),mainArtifact:$('mainArtifact'),killText:$('killText'),timeText:$('timeText'),qiText:$('qiText'),dangerText:$('dangerText'),qiBar:$('qiBar'),hpBar:$('hpBar'),artifacts:$('artifacts'),toast:$('toast'),overTitle:$('overTitle'),result:$('result')};
let W=0,H=0,DPR=1,running=false,paused=false,last=performance.now(),keys=Object.create(null),player,cam,time=0,kills=0,realmLevel=1,qi=0,qiNeed=6,owned,evolutions,passives,timers,beasts=[],projectiles=[],qiOrbs=[],areas=[],particles=[],rings=[],levelChoices=[],selectedCharacter='yun',tribulationStarted=false,bossSpawned=false;
const joy={baseX:0,baseY:0,x:0,y:0,dx:0,dy:0,active:false,id:null,radius:74,knob:31,visible:false};
const realms=['연기','축기','금단','원영','화신','연허','합체','대승','도겁','진선'];
const characterData={yun:{name:'유청운',robe:'#2563eb',trim:'#dbeafe',aura:'#93c5fd',hair:'#111827',hp:140,speed:258,dmgMul:1.08,thunderCdMul:1,damageReduction:1,start:{sword:1,thunder:1}},soyeon:{name:'백소연',robe:'#7c3aed',trim:'#ddd6fe',aura:'#7dd3fc',hair:'#1e1b4b',hp:118,speed:272,dmgMul:1,thunderCdMul:.76,damageReduction:1,start:{thunder:2,sword:1}},mujin:{name:'진무결',robe:'#92400e',trim:'#fed7aa',aura:'#facc15',hair:'#1c1917',hp:190,speed:238,dmgMul:1,thunderCdMul:1,damageReduction:.78,start:{array:1,sword:1,jade:1}}};
const artifactData={sword:{icon:'⚔️',name:'비검',kind:'검',desc:'가장 가까운 요수를 향해 날아가는 기본 법보.'},thunder:{icon:'⚡',name:'청뢰부',kind:'뇌',desc:'무작위 요수 위치에 낙뢰를 떨어뜨린다.'},flame:{icon:'🔥',name:'혈염주',kind:'화',desc:'불꽃 구슬이 적을 추적하며 폭발한다.'},ice:{icon:'❄️',name:'한빙침',kind:'빙',desc:'얼음 침으로 적을 둔화시킨다.'},array:{icon:'☯️',name:'태극진',kind:'진법',desc:'주변에 진법을 펼쳐 접근한 적을 태운다.'},puppet:{icon:'🧿',name:'목갑괴뢰',kind:'괴뢰',desc:'괴뢰가 영탄을 자동 발사한다.'},poison:{icon:'☠️',name:'독혼번',kind:'독',desc:'독 안개를 생성해 지속 피해를 준다.'},jade:{icon:'🛡️',name:'호신옥패',kind:'호신',desc:'일정 주기마다 피해를 막는 보호막.'}};
const passiveData={swordArt:{icon:'📜',name:'청운검결',desc:'검계 법보 강화.'},thunderArt:{icon:'📘',name:'구천뇌법',desc:'뇌계 법보 강화.'},flameArt:{icon:'📕',name:'혈마심경',desc:'화계 법보 강화.'},iceArt:{icon:'📗',name:'빙심결',desc:'빙계 법보 강화.'},arrayArt:{icon:'📙',name:'태상진해',desc:'진법 범위 강화.'},puppetArt:{icon:'⚙️',name:'천기괴뢰술',desc:'괴뢰계 법보 강화.'},absorbArt:{icon:'🌌',name:'흡령대법',desc:'영기 흡수 범위 증가.'},bodyArt:{icon:'💪',name:'금강불괴공',desc:'체력과 생존력 증가.'}};
const evolutionData=[{need:['sword','swordArt'],key:'tenThousandSwords',icon:'🌌',name:'만검귀종',desc:'수십 자루의 검광이 전장을 가른다.'},{need:['thunder','thunderArt'],key:'nineThunder',icon:'🌩️',name:'구천신뢰부',desc:'낙뢰가 요수 사이를 연쇄 전이한다.'},{need:['flame','flameArt'],key:'bloodFlameWheel',icon:'☀️',name:'혈해염륜',desc:'혈염의 고리가 주변을 회전한다.'},{need:['ice','iceArt'],key:'deepIceNeedle',icon:'🧊',name:'만년현빙침',desc:'한빙 폭풍으로 적을 묶는다.'},{need:['array','arrayArt'],key:'yinYangArray',icon:'☯️',name:'양의진천도',desc:'대형 태극진이 주변을 지배한다.'},{need:['puppet','puppetArt'],key:'heavenPuppet',icon:'🤖',name:'천기전투괴뢰',desc:'대형 괴뢰가 전장을 지원한다.'},{need:['poison','absorbArt'],key:'tenPoisonBanner',icon:'🟢',name:'만독혼번',desc:'독이 전염되며 요수를 갉아먹는다.'},{need:['jade','bodyArt'],key:'heavenGuardJade',icon:'🛡️',name:'천강호신패',desc:'호신막 파괴 시 회복과 충격파.'}];
function rand(a,b){return Math.random()*(b-a)+a}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by)}function fmt(t){t=Math.floor(t);return Math.floor(t/60)+':'+String(t%60).padStart(2,'0')}function screen(x,y){return{x:x-cam.x+W/2,y:y-cam.y+H/2}}function danger(){return 1+Math.floor(time/22)+Math.floor(realmLevel/7)}function realmName(){const major=Math.floor((realmLevel-1)/9),minor=((realmLevel-1)%9)+1;return `${realms[Math.min(major,realms.length-1)]} ${minor}성`}function evo(key){return!!evolutions[key]}function dmgScale(){return player?.dmgMul||1}
function toast(msg){el.toast.textContent=msg;el.toast.style.opacity='1';clearTimeout(toast.t);toast.t=setTimeout(()=>el.toast.style.opacity='0',900)}
function resize(){DPR=Math.min(devicePixelRatio||1,1.5);W=innerWidth;H=innerHeight;canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0)}
function resetGame(){const ch=characterData[selectedCharacter]||characterData.yun;player={x:0,y:0,r:18,hp:ch.hp,maxHp:ch.hp,speed:ch.speed,angle:0,inv:0,shield:0,jadeCooldown:0,absorb:178,character:selectedCharacter,dmgMul:ch.dmgMul,thunderCdMul:ch.thunderCdMul,damageReduction:ch.damageReduction};cam={x:0,y:0,shake:0};time=0;kills=0;realmLevel=1;qi=0;qiNeed=6;owned={...ch.start};passives={};evolutions={};timers={spawn:0,sword:0,thunder:0,flame:0,ice:0,array:0,puppet:0,poison:0,jade:0,tribulation:0};beasts=[];projectiles=[];qiOrbs=[];areas=[];particles=[];rings=[];tribulationStarted=false;bossSpawned=false;for(let i=0;i<24;i++)spawnBeast(false);updateUI()}
function startGame(){el.menu.style.display='none';el.levelPanel.style.display='none';el.gameover.style.display='none';resetGame();running=true;paused=false;toast('비경 입장')}
function spawnBeast(boss=false){const max=W<700?210:310;if(beasts.length>max&&!boss)return;const side=Math.floor(rand(0,4)),margin=Math.max(W,H)*.58+160;let x=player.x,y=player.y;if(side===0){x+=rand(-W/2,W/2);y-=margin}else if(side===1){x+=rand(-W/2,W/2);y+=margin}else if(side===2){x-=margin;y+=rand(-H/2,H/2)}else{x+=margin;y+=rand(-H/2,H/2)}const elite=!boss&&Math.random()<Math.min(.18,time/275);let type='bloodWolf',r0=Math.random();if(r0>.68)type='poisonBug';if(r0>.84)type='ghost';if(r0>.94)type='charger';if(elite)type=['ironOx','thunderSerpent','demonCultivator','shadowFiend'][Math.floor(rand(0,4))];if(boss)type='blackMountainKing';const base=7+danger()*3+time/11;const hpMul=boss?98:elite?7:type==='ironOx'?4:type==='poisonBug'?.65:1;const r=boss?56:elite?28:type==='poisonBug'?13:18;const spMul=boss?.45:type==='charger'?1.7:type==='ironOx'?.65:1;const hp=base*hpMul;beasts.push({x,y,r,type,hp,maxHp:hp,speed:(70+Math.min(140,time*1.15))*spMul,boss,elite,hit:0,slow:0,poison:0,bind:0,chargeTimer:rand(.4,1.4),shootTimer:rand(1.2,2.4),dead:false})}
function addQi(x,y,value=1){qiOrbs.push({x,y,r:7,value,spin:rand(0,Math.PI*2),dead:false})}function particle(x,y,color,count=10,power=180){const limit=W<700?360:620;for(let i=0;i<count&&particles.length<limit;i++){const a=rand(0,Math.PI*2),s=rand(power*.2,power);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rand(2,5),life:rand(.25,.72),max:.72,color})}}function ring(x,y,color,r=90){rings.push({x,y,color,r,life:.38,max:.38})}function area(x,y,r,life,dmg,type,extra={}){areas.push({x,y,r,life,max:life,dmg,type,...extra})}
function nearest(x=player.x,y=player.y){let best=null,bd=Infinity;for(const b of beasts){const d=dist(x,y,b.x,b.y);if(d<bd){best=b;bd=d}}return best}
function shoot(type,ang,opt={}){const limit=W<700?380:560;if(projectiles.length>limit)return;const sp=opt.speed||620;projectiles.push({type,x:opt.x??player.x+Math.cos(ang)*25,y:opt.y??player.y+Math.sin(ang)*25,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,r:opt.r||7,life:opt.life||1.25,dmg:(opt.dmg||3)*(opt.fromEnemy?1:dmgScale()),color:opt.color||'#e0f2fe',homing:!!opt.homing,pierce:opt.pierce||0,poison:opt.poison||0,slow:opt.slow||0,explode:opt.explode||0,fromEnemy:!!opt.fromEnemy})}
function gainQi(v){qi+=v;while(qi>=qiNeed){qi-=qiNeed;realmLevel++;qiNeed=Math.floor(qiNeed*1.32+5);openLevelUp();if(paused)break}updateUI()}
function canEvo(e){const[a,p]=e.need;return owned[a]>=5&&passives[p]&&!evolutions[e.key]}
function openLevelUp(){paused=true;const pool=[];for(const e of evolutionData)if(canEvo(e))pool.push({type:'evolution',evo:e,title:`${e.icon} ${e.name} 승급`,desc:e.desc});for(const k of Object.keys(artifactData)){const d=artifactData[k];if(!owned[k])pool.push({type:'artifact',key:k,title:`${d.icon} ${d.name} 획득`,desc:d.desc});else if(owned[k]<8)pool.push({type:'artifact',key:k,title:`${d.icon} ${d.name} Lv.${owned[k]+1}`,desc:`${d.kind}계 법보 강화`})}for(const k of Object.keys(passiveData))if(!passives[k]){const d=passiveData[k];pool.push({type:'passive',key:k,title:`${d.icon} ${d.name} 습득`,desc:d.desc})}const r=Math.random();if(r<.32)pool.unshift({type:'heal',title:'🍶 회춘단 복용',desc:'즉시 체력 35% 회복'});if(r>.72)pool.unshift({type:'speed',title:'👣 신행보 각성',desc:'이 판 동안 이동속도 +8%'});levelChoices=pool.sort(()=>Math.random()-.5).slice(0,3);el.choices.innerHTML=levelChoices.map((p,i)=>`<button class="${p.type==='evolution'?'choice evo':p.type==='heal'||p.type==='speed'?'choice danger':'choice'}" data-pick="${i}">${p.title}<small>${p.desc}</small></button>`).join('');el.levelPanel.style.display='grid'}
function pickLevel(i){const p=levelChoices[i];if(!p)return;if(p.type==='evolution'){evolutions[p.evo.key]=true;particle(player.x,player.y,'#f59e0b',80,500);ring(player.x,player.y,'#f59e0b',230);toast(`${p.evo.icon} ${p.evo.name}\n법보 승급`)}else if(p.type==='artifact'){owned[p.key]=(owned[p.key]||0)+1;const d=artifactData[p.key];toast(`${d.icon} ${d.name}\nLv.${owned[p.key]}`)}else if(p.type==='passive'){passives[p.key]=true;toast(`${passiveData[p.key].icon} ${passiveData[p.key].name}\n공법 습득`)}else if(p.type==='heal'){player.hp=Math.min(player.maxHp,player.hp+player.maxHp*.35);particle(player.x,player.y,'#22c55e',30,260);toast('회춘단 복용')}else if(p.type==='speed'){player.speed*=1.08;particle(player.x,player.y,'#38bdf8',30,260);toast('신행보 각성')}paused=false;el.levelPanel.style.display='none';updateUI()}
function artifactUpdate(dt){const t=nearest(),a=t?Math.atan2(t.y-player.y,t.x-player.x):player.angle;if(owned.sword&&(timers.sword-=dt)<=0){const lv=owned.sword,ev=evo('tenThousandSwords'),n=ev?9+Math.floor(lv/2):1+Math.floor(lv/3);for(let i=0;i<n;i++)shoot('sword',a+rand(-.55,.55),{dmg:4+lv*1.4,speed:ev?790:680,r:ev?8:6,pierce:ev?4:Math.floor(lv/4),color:ev?'#fef3c7':'#bfdbfe',homing:!ev});timers.sword=ev?.13:Math.max(.18,.48-lv*.035)}if(owned.thunder&&(timers.thunder-=dt)<=0){const lv=owned.thunder,ev=evo('nineThunder'),n=ev?7+lv:1+Math.floor(lv/2);for(let i=0;i<n;i++){const b=beasts[Math.floor(Math.random()*beasts.length)];if(b){const r=ev?78:52+lv*3;area(b.x,b.y,r,.16,ev?8+lv:5+lv*.9,'thunder');particle(b.x,b.y,'#7dd3fc',12,260);ring(b.x,b.y,'#7dd3fc',r)}}timers.thunder=(ev?.38:Math.max(.52,1.05-lv*.055))*(player.thunderCdMul||1)}if(owned.flame&&(timers.flame-=dt)<=0){const lv=owned.flame,ev=evo('bloodFlameWheel'),n=ev?4:1+Math.floor(lv/3);for(let i=0;i<n;i++)shoot('flame',a+rand(-1.2,1.2),{dmg:5+lv*1.2,speed:510,r:ev?12:9,homing:true,explode:ev?72:38,color:'#fb7185'});timers.flame=ev?.32:Math.max(.62,1.15-lv*.06)}if(owned.ice&&(timers.ice-=dt)<=0){const lv=owned.ice,ev=evo('deepIceNeedle'),n=ev?14:4+lv;for(let i=0;i<n;i++){const aa=a+(i-n/2)*(ev?.18:.23);shoot('ice',aa,{dmg:2.8+lv*.65,speed:560,r:5,pierce:ev?3:1,slow:ev?1.6:.85,color:'#93c5fd'})}timers.ice=ev?.42:Math.max(.75,1.3-lv*.06)}if(owned.array&&(timers.array-=dt)<=0){const lv=owned.array,ev=evo('yinYangArray'),r=ev?165+lv*7:82+lv*8;area(player.x,player.y,r,ev?.62:.35,ev?6+lv*.8:3+lv*.5,'array');timers.array=ev?.38:Math.max(.62,1.15-lv*.055)}if(owned.puppet&&(timers.puppet-=dt)<=0){const lv=owned.puppet,ev=evo('heavenPuppet'),n=ev?5:1+Math.floor(lv/2);for(let i=0;i<n;i++){const off=Math.PI*2/n*i+time*1.2,sx=player.x+Math.cos(off)*(ev?78:56),sy=player.y+Math.sin(off)*(ev?78:56),tt=nearest(sx,sy),aa=tt?Math.atan2(tt.y-sy,tt.x-sx):off;shoot('puppet',aa,{x:sx,y:sy,dmg:3+lv*.8,speed:ev?710:590,r:ev?7:5,pierc function drawCharger(b,p){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(player.y-b.y,player.x-b.x));ctx.shadowColor='#ef4444';ctx.shadowBlur=14;ctx.fillStyle=b.hit>0?'#fecaca':'#b91c1c';ctx.strokeStyle='#fecaca';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(b.r*1.2,0);ctx.lineTo(-b.r*.65,-b.r*.78);ctx.lineTo(-b.r*.25,0);ctx.lineTo(-b.r*.65,b.r*.78);ctx.closePath();ctx.fill();ctx.stroke();ctx.strokeStyle='#fef3c7';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(b.r*.5,-b.r*.22);ctx.lineTo(b.r*1.25,-b.r*.55);ctx.stroke();ctx.beginPath();ctx.moveTo(b.r*.5,b.r*.22);ctx.lineTo(b.r*1.25,b.r*.55);ctx.stroke();ctx.restore()}

function drawDemon(b,p){ctx.save();ctx.translate(p.x,p.y);ctx.shadowColor='#fb7185';ctx.shadowBlur=12;ctx.fillStyle=b.hit>0?'#fecdd3':'#4c0519';ctx.strokeStyle='#fb7185';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-b.r*.95);ctx.lineTo(b.r*.72,b.r*.85);ctx.lineTo(0,b.r*.55);ctx.lineTo(-b.r*.72,b.r*.85);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#fca5a5';ctx.beginPath();ctx.arc(0,-b.r*.82,b.r*.33,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ef4444';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-b.r*.58,-b.r*.1);ctx.lineTo(-b.r*1.02,-b.r*.45);ctx.stroke();ctx.beginPath();ctx.moveTo(b.r*.58,-b.r*.1);ctx.lineTo(b.r*1.02,-b.r*.45);ctx.stroke();ctx.restore()}
function drawShadow(b,p){ctx.save();ctx.translate(p.x,p.y);ctx.shadowColor='#c084fc';ctx.shadowBlur=18;ctx.fillStyle=b.hit>0?'#e9d5ff':'#111827';ctx.strokeStyle='#a855f7';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,2,b.r*.76,b.r*1.05,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.strokeStyle='#e9d5ff';ctx.lineWidth=3;for(let s=-1;s<=1;s+=2){ctx.beginPath();ctx.moveTo(s*b.r*.45,-b.r*.1);ctx.lineTo(s*b.r*1.1,b.r*.38);ctx.lineTo(s*b.r*.72,b.r*.18);ctx.stroke()}ctx.fillStyle='#fef3c7';ctx.beginPath();ctx.arc(-b.r*.2,-b.r*.32,2.4,0,Math.PI*2);ctx.arc(b.r*.2,-b.r*.32,2.4,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawBoss(b,p){ctx.save();ctx.translate(p.x,p.y);ctx.shadowColor='#fb923c';ctx.shadowBlur=28;ctx.fillStyle=b.hit>0?'#fed7aa':'#7f1d1d';ctx.strokeStyle='#fb923c';ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(0,8,b.r*.82,b.r*1.05,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(0,-b.r*.72,b.r*.48,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.strokeStyle='#fef3c7';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(-b.r*.32,-b.r*1.02);ctx.quadraticCurveTo(-b.r*.95,-b.r*1.45,-b.r*1.2,-b.r*.8);ctx.stroke();ctx.beginPath();ctx.moveTo(b.r*.32,-b.r*1.02);ctx.quadraticCurveTo(b.r*.95,-b.r*1.45,b.r*1.2,-b.r*.8);ctx.stroke();ctx.strokeStyle='#991b1b';ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(-b.r*.6,-b.r*.15);ctx.lineTo(-b.r*1.25,b.r*.45);ctx.stroke();ctx.beginPath();ctx.moveTo(b.r*.6,-b.r*.15);ctx.lineTo(b.r*1.25,b.r*.45);ctx.stroke();ctx.fillStyle='#fef3c7';ctx.beginPath();ctx.arc(-b.r*.18,-b.r*.78,4,0,Math.PI*2);ctx.arc(b.r*.18,-b.r*.78,4,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawBeasts(){for(const b of beasts){const p=screen(b.x,b.y);if(b.boss)drawBoss(b,p);else if(b.type==='ironOx')drawOx(b,p);else if(b.type==='poisonBug')drawBug(b,p);else if(b.type==='ghost')drawGhost(b,p);else if(b.type==='charger')drawCharger(b,p);else if(b.type==='thunderSerpent')drawSerpent(b,p);else if(b.type==='demonCultivator')drawDemon(b,p);else if(b.type==='shadowFiend')drawShadow(b,p);else drawWolf(b,p);hpBar(b,p)}}
function drawParticles(){for(const p0 of particles){const p=screen(p0.x,p0.y);ctx.globalAlpha=clamp(p0.life/p0.max,0,1);ctx.fillStyle=p0.color;ctx.shadowColor=p0.color;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(p.x,p.y,p0.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1}for(const r of rings){const p=screen(r.x,r.y),q=1-r.life/r.max;ctx.globalAlpha=clamp(r.life/r.max,0,1);ctx.strokeStyle=r.color;ctx.shadowColor=r.color;ctx.shadowBlur=18;ctx.lineWidth=8*(1-q)+2;ctx.beginPath();ctx.arc(p.x,p.y,r.r*q,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1}}
function drawPlayer(){const p=screen(player.x,player.y),ch=characterData[player.character]||characterData.yun,auraRadius=player.shield>0?80:62;const aura=ctx.createRadialGradient(p.x,p.y,5,p.x,p.y,auraRadius);aura.addColorStop(0,player.shield>0?'rgba(167,243,208,.55)':ch.aura+'88');aura.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=aura;ctx.beginPath();ctx.arc(p.x,p.y,auraRadius,0,Math.PI*2);ctx.fill();if(player.shield>0){ctx.strokeStyle='#a7f3d0';ctx.lineWidth=3;ctx.shadowColor='#a7f3d0';ctx.shadowBlur=18;ctx.beginPath();ctx.arc(p.x,p.y,38+Math.sin(time*8)*3,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0}ctx.globalAlpha=player.inv>0?.72:1;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(player.angle);ctx.shadowColor=ch.aura;ctx.shadowBlur=22;ctx.fillStyle=ch.robe;ctx.strokeStyle=ch.trim;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(22,0);ctx.lineTo(-10,-18);ctx.lineTo(-24,-6);ctx.lineTo(-15,0);ctx.lineTo(-24,6);ctx.lineTo(-10,18);ctx.closePath();ctx.fill();ctx.stroke();ctx.strokeStyle=ch.trim;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-4,-14);ctx.lineTo(8,0);ctx.lineTo(-4,14);ctx.stroke();ctx.fillStyle='#fde68a';ctx.beginPath();ctx.arc(2,0,10,0,Math.PI*2);ctx.fill();ctx.fillStyle=ch.hair;ctx.beginPath();ctx.arc(-2,-2,11,Math.PI*.8,Math.PI*1.95);ctx.fill();if(player.character==='yun'){ctx.strokeStyle='#f8fafc';ctx.lineWidth=4;ctx.shadowColor='#dbeafe';ctx.shadowBlur=18;ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(42,0);ctx.stroke();ctx.fillStyle='#fef3c7';ctx.beginPath();ctx.moveTo(48,0);ctx.lineTo(37,-5);ctx.lineTo(37,5);ctx.closePath();ctx.fill()}else if(player.character==='soyeon'){ctx.strokeStyle='#7dd3fc';ctx.lineWidth=3;ctx.shadowColor='#7dd3fc';ctx.shadowBlur=22;ctx.beginPath();ctx.moveTo(15,-8);ctx.lineTo(34,-18);ctx.lineTo(27,-5);ctx.lineTo(42,-8);ctx.stroke();ctx.beginPath();ctx.arc(31,12,8,0,Math.PI*2);ctx.stroke()}else{ctx.fillStyle='#facc15';ctx.shadowColor='#facc15';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(23,-10,6,0,Math.PI*2);ctx.arc(23,10,6,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fed7aa';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(15,-10);ctx.lineTo(30,-18);ctx.stroke();ctx.beginPath();ctx.moveTo(15,10);ctx.lineTo(30,18);ctx.stroke()}ctx.restore();ctx.shadowBlur=0;ctx.globalAlpha=1}
function drawJoy(){if(!joy.visible)return;ctx.save();ctx.globalAlpha=.95;ctx.fillStyle='rgba(14,165,233,.12)';ctx.beginPath();ctx.arc(joy.baseX,joy.baseY,joy.radius+20,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(125,211,252,.85)';ctx.lineWidth=5;ctx.beginPath();ctx.arc(joy.baseX,joy.baseY,joy.radius,0,Math.PI*2);ctx.stroke();ctx.fillStyle=joy.active?'rgba(186,230,253,.76)':'rgba(186,230,253,.42)';ctx.beginPath();ctx.arc(joy.x,joy.y,joy.knob,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=3;ctx.stroke();ctx.restore()}
function draw(){drawBg();if(tribulationStarted){ctx.globalAlpha=.18+Math.sin(time*8)*.04;ctx.fillStyle='#581c87';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}drawAreas();drawOrbs();drawProjectiles();drawBeasts();drawParticles();drawPlayer();drawJoy()}
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}
function moveJoy(px,py){let dx=px-joy.baseX,dy=py-joy.baseY,d=Math.hypot(dx,dy);if(d>joy.radius*1.85){const nx=dx/d,ny=dy/d;joy.baseX=px-nx*joy.radius;joy.baseY=py-ny*joy.radius;dx=px-joy.baseX;dy=py-joy.baseY;d=Math.hypot(dx,dy)}if(d>joy.radius){dx=dx/d*joy.radius;dy=dy/d*joy.radius}joy.dx=dx/joy.radius;joy.dy=dy/joy.radius;joy.x=joy.baseX+dx;joy.y=joy.baseY+dy}
function releaseJoy(){joy.active=false;joy.visible=false;joy.id=null;joy.dx=0;joy.dy=0}
addEventListener('resize',resize);addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);canvas.addEventListener('pointerdown',e=>{joy.active=true;joy.visible=true;joy.id=e.pointerId;joy.baseX=e.clientX;joy.baseY=e.clientY;joy.x=e.clientX;joy.y=e.clientY;joy.dx=0;joy.dy=0;canvas.setPointerCapture(e.pointerId)});canvas.addEventListener('pointermove',e=>{if(joy.active&&e.pointerId===joy.id)moveJoy(e.clientX,e.clientY)});canvas.addEventListener('pointerup',e=>{if(e.pointerId===joy.id)releaseJoy()});canvas.addEventListener('pointercancel',releaseJoy);el.startBtn.addEventListener('click',startGame);el.restartBtn.addEventListener('click',startGame);$('charSelect').addEventListener('click',e=>{const b=e.target.closest('[data-char]');if(!b)return;selectedCharacter=b.dataset.char;document.querySelectorAll('.charCard').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')});el.choices.addEventListener('click',e=>{const b=e.target.closest('[data-pick]');if(b)pickLevel(Number(b.dataset.pick))});resize();resetGame();el.menu.style.display='grid';requestAnimationFrame(loop);
})();
